name: Build and publish NuGet package to organization

on:
  push:
    branches:
      - production

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore DevInsightForge.Templates.Api.csproj

      - name: Pack template
        run: dotnet pack DevInsightForge.Templates.Api.csproj -c Release -o ./artifacts

      - name: Push NuGet package to organization
        run: dotnet nuget push "./artifacts/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate
